<body class="min-h-screen flex flex-col items-center py-xl px-page-margin-mobile md:px-page-margin-desktop font-body-md text-body-md text-text">
<!-- Header (Transactional, no global nav) -->
<header class="w-full max-w-2xl mb-xl flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-surface-tint" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="font-h3 text-h3 text-surface-tint tracking-tight">Fresh As Ever</span>
</div>
<button class="text-text-muted hover:text-text font-label text-label transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">close</span>
            Exit
        </button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-xl flex-grow">
<!-- Progress Indicator -->
<div class="mb-xl">
<div class="flex items-center justify-between mb-sm">
<span class="font-label-caps text-label-caps text-surface-tint uppercase">Step 1 of 4</span>
<span class="font-label-caps text-label-caps text-text-muted uppercase">Business Info</span>
</div>
<div class="h-2 w-full bg-surface-variant rounded-full overflow-hidden flex">
<div class="h-full bg-surface-tint w-1/4 rounded-full transition-all duration-500 ease-in-out"></div>
</div>
</div>
<!-- Surface Card -->
<div class="bg-surface rounded-xl shadow-ambient p-md md:p-xl">
<div class="mb-lg">
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Business Information</h1>
<p class="font-body-md text-body-md text-text-muted">Tell us about your establishment to help us verify your account.</p>
</div>
<form class="space-y-lg flex flex-col">
<!-- Business Name -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="businessName">Legal Business Name</label>
<input class="w-full h-12 px-sm py-xs border border-outline-variant rounded-lg bg-surface text-on-surface placeholder:text-text-faint focus:outline-none focus:ring-2 focus:ring-primary-highlight focus:border-surface-tint transition-all font-body-md text-body-md" id="businessName" name="businessName" placeholder="e.g. The Colombo Bakery Ltd" type="text"/>
</div>
<!-- Registration Number -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="regNumber">Business Registration Number</label>
<input class="w-full h-12 px-sm py-xs border border-outline-variant rounded-lg bg-surface text-on-surface placeholder:text-text-faint focus:outline-none focus:ring-2 focus:ring-primary-highlight focus:border-surface-tint transition-all font-body-md text-body-md" id="regNumber" name="regNumber" placeholder="BR-XXXXXXX" type="text"/>
</div>
<!-- Primary Contact Name -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="contactName">Primary Contact Name</label>
<input class="w-full h-12 px-sm py-xs border border-outline-variant rounded-lg bg-surface text-on-surface placeholder:text-text-faint focus:outline-none focus:ring-2 focus:ring-primary-highlight focus:border-surface-tint transition-all font-body-md text-body-md" id="contactName" name="contactName" placeholder="Full Name" type="text"/>
</div>
<!-- Primary Contact Email -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="contactEmail">Primary Contact Email</label>
<input class="w-full h-12 px-sm py-xs border border-outline-variant rounded-lg bg-surface text-on-surface placeholder:text-text-faint focus:outline-none focus:ring-2 focus:ring-primary-highlight focus:border-surface-tint transition-all font-body-md text-body-md" id="contactEmail" name="contactEmail" placeholder="hello@bakery.lk" type="email"/>
</div>
<!-- Action Area -->
<div class="pt-md mt-sm flex justify-end">
<button class="w-full md:w-auto h-12 px-xl bg-surface-tint text-on-primary font-label text-label rounded-lg active:scale-95 transition-transform duration-120 flex items-center justify-center gap-sm" type="button">
                        Next
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
