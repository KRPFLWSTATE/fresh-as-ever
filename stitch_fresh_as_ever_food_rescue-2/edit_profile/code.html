<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.text');
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom input focus ring to match brand teal */
        input:focus, select:focus {
            box-shadow: 0 0 0 2px theme('colors.primary-highlight');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background min-h-screen pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-[#f7f6f2] dark:bg-stone-950 border-b border-stone-200/60 dark:border-stone-800">
<button class="text-[#01696f] dark:text-teal-500 hover:bg-stone-100 dark:hover:bg-stone-900 transition-colors active:scale-95 duration-150 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-[#01696f] dark:text-teal-400 tracking-tighter">Edit Profile</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="pt-20 px-page-margin-mobile md:px-page-margin-desktop max-w-3xl mx-auto space-y-lg">
<!-- Profile Photo Section (Glassmorphism/Bento feel) -->
<section class="bg-surface rounded-xl p-md shadow-[0_4px_24px_rgba(30,27,20,0.02)] flex flex-col items-center justify-center space-y-md border border-divider/40 relative overflow-hidden">
<!-- Decorative subtle gradient backdrop -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-highlight/20 to-transparent pointer-events-none"></div>
<div class="relative z-10 group cursor-pointer">
<div class="w-24 h-24 rounded-full overflow-hidden border-4 border-surface shadow-sm relative">
<img alt="Profile Photo" class="w-full h-full object-cover" data-alt="Portrait of a young urban professional smiling warmly, well-lit studio lighting, natural skin tones, soft background blur" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBigucv7MZv-ciWUVTGZ5toO-R9FeBNk3p5y8OpunaBkXjNIf05AUorvrgRyyn2z_OtXuhpA924MCoEXjB02uHmma2QlO3DtRshFAcf_XWAMjxyl9OqQW1u5dG1wicLyVNAcUntSAsNYP62DEp_B_qiROM4oO1tAj_OQ4_zyAbhbvVCUZ1qQUwEi0O5VbRr-mY4WigcJ3pj4LXu0ot4eMC4PIEy0rbl8CbaiTL0IYFe71i9aXL8T67TBSGHINwDYcdjawqrGRZabw"/>
<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-200">
<span class="material-symbols-outlined text-white icon-fill" data-icon="photo_camera">photo_camera</span>
</div>
</div>
<button class="absolute bottom-0 right-0 bg-primary-container text-on-primary h-8 w-8 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform border-2 border-surface">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</div>
<p class="font-body-sm text-text-muted z-10 text-center">Tap to update your photo<br/><span class="text-[11px]">Max size 5MB (JPG/PNG)</span></p>
</section>
<!-- Details Form -->
<form class="space-y-xl bg-surface rounded-xl p-lg shadow-[0_4px_24px_rgba(30,27,20,0.02)] border border-divider/40">
<div class="space-y-md">
<h2 class="font-h3 text-text border-b border-divider/50 pb-sm">Personal Information</h2>
<!-- Full Name -->
<div class="space-y-xs relative">
<label class="font-label text-text block" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[20px]" data-icon="person">person</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border-outline-variant bg-surface focus:border-primary-container focus:ring-0 font-body-md text-text transition-shadow" id="fullName" placeholder="Enter your full name" type="text" value="Amaya Silva"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-xs relative">
<label class="font-label text-text block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[20px]" data-icon="mail">mail</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border-outline-variant bg-surface focus:border-primary-container focus:ring-0 font-body-md text-text transition-shadow" id="email" placeholder="Enter your email" type="email" value="amaya.s@example.com"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-xs relative">
<label class="font-label text-text block" for="phone">Phone Number</label>
<div class="relative flex">
<select class="h-12 rounded-l-lg border-outline-variant border-r-0 bg-surface-container-low font-body-md text-text focus:border-primary-container focus:ring-0 w-24 px-2">
<option>+94</option>
<option>+1</option>
<option>+44</option>
</select>
<input class="w-full h-12 px-4 rounded-r-lg border-outline-variant bg-surface focus:border-primary-container focus:ring-0 font-body-md text-text transition-shadow" id="phone" placeholder="77 123 4567" type="tel" value="77 123 4567"/>
</div>
<p class="font-body-sm text-text-muted text-[12px] mt-1">Used for order updates and recovery.</p>
</div>
</div>
<div class="space-y-md pt-sm">
<h2 class="font-h3 text-text border-b border-divider/50 pb-sm">Location Preferences</h2>
<!-- Primary Location -->
<div class="space-y-xs relative">
<label class="font-label text-text block" for="location">Default Rescue Area</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[20px]" data-icon="location_on">location_on</span>
<select class="w-full h-12 pl-10 pr-10 rounded-lg border-outline-variant bg-surface focus:border-primary-container focus:ring-0 font-body-md text-text appearance-none transition-shadow" id="location">
<option>Colombo 03</option>
<option>Colombo 04</option>
<option>Colombo 07</option>
<option>Mount Lavinia</option>
<option>Dehiwala</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-lg flex flex-col sm:flex-row gap-md">
<button class="w-full sm:w-2/3 h-12 bg-primary-container text-on-primary rounded-lg font-label font-semibold active:scale-97 transition-all duration-120 flex justify-center items-center" type="submit">
                    Save Changes
                </button>
<button class="w-full sm:w-1/3 h-12 border-[1.5px] border-primary-container text-primary-container bg-transparent rounded-lg font-label font-semibold active:scale-97 transition-all duration-120 flex justify-center items-center" type="button">
                    Cancel
                </button>
</div>
<div class="pt-sm text-center">
<button class="font-label text-error hover:underline bg-transparent border-none" type="button">
                    Delete Account
                </button>
</div>
</form>
</main>
<!-- Suppressed Nav Shells as this is a transactional/settings sub-page with a back button -->
</body></html>
