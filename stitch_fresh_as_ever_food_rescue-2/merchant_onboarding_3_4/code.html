<body class="min-h-screen flex flex-col items-center justify-center p-page-margin-mobile md:p-page-margin-desktop antialiased">
<!-- Main Container -->
<main class="w-full max-w-lg bg-surface rounded-xl shadow-[0_8px_30px_rgba(30,27,20,0.04)] overflow-hidden flex flex-col">
<!-- Header -->
<div class="px-lg pt-lg pb-md border-b border-divider flex flex-col gap-sm">
<div class="flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-95 text-text-muted">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<div class="flex gap-2 items-center">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>

</div>
</div>
<div class="mt-4">
<span class="font-label-caps text-label-caps text-primary uppercase tracking-wider">Step 3 of 4</span>
<h1 class="font-h1 text-h1 text-text mt-1">Bank &amp; Payout Information</h1>
<p class="font-body-md text-body-md text-text-muted mt-2">Where should we send your earnings? This account must belong to the registered business or owner.</p>
</div>
</div>
<!-- Form Canvas -->
<div class="p-lg flex-1">
<form class="flex flex-col gap-lg">
<!-- Account Holder Name -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-text" for="acc_name">Account Holder Name</label>
<input class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:outline-none transition-shadow text-body-md font-body-md placeholder:text-text-faint" id="acc_name" placeholder="e.g. Fresh Foods Ltd." type="text"/>
</div>
<!-- Bank Name -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-text" for="bank_name">Bank Name</label>
<div class="relative">
<select class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:outline-none transition-shadow text-body-md font-body-md appearance-none" id="bank_name">
<option disabled="" selected="" value="">Select your bank</option>
<option value="boc">Bank of Ceylon</option>
<option value="com">Commercial Bank</option>
<option value="hnb">Hatton National Bank</option>
<option value="sampath">Sampath Bank</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">expand_more</span>
</div>
</div>
<!-- Branch Row -->
<div class="grid grid-cols-2 gap-md">
<!-- Branch Code -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-text" for="branch_code">Branch Code</label>
<input class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:outline-none transition-shadow text-body-md font-body-md placeholder:text-text-faint" id="branch_code" placeholder="e.g. 012" type="text"/>
</div>
<!-- Account Number -->
<div class="flex flex-col gap-xs col-span-1">
<label class="font-label text-label text-text" for="acc_number">Account Number</label>
<input class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:outline-none transition-shadow text-body-md font-body-md placeholder:text-text-faint" id="acc_number" placeholder="Enter account number" type="text"/>
</div>
</div>
<!-- Info Box -->
<div class="bg-surface-2 p-md rounded-lg flex items-start gap-md mt-sm border border-surface-container-high">
<span class="material-symbols-outlined text-primary mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-body-sm text-body-sm text-text-muted">Payouts are processed weekly. Ensure these details are accurate to avoid delays in receiving your funds.</p>
</div>
<!-- Action Area -->
<div class="pt-md mt-sm border-t border-divider">
<button class="w-full h-12 bg-primary hover:bg-primary-hover active:scale-[0.97] transition-all duration-120 text-on-primary font-h3 text-h3 rounded-lg flex items-center justify-center shadow-sm" type="button">
                        Continue to Review
                    </button>
<button class="w-full h-12 mt-sm border-[1.5px] border-primary text-primary hover:bg-surface-container active:scale-[0.97] transition-all duration-120 font-h3 text-h3 rounded-lg flex items-center justify-center" type="button">
                        Save for later
                    </button>
</div>
</form>
