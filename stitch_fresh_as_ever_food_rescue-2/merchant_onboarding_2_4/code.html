</div>
<div class="space-y-xs">
<label class="block font-label text-label text-on-surface-variant flex items-center justify-between">
<span>Location</span>
<span class="text-text-muted font-body-sm text-body-sm flex items-center gap-xs"><span class="material-symbols-outlined text-[16px]">my_location</span> Auto-detect</span>

<div class="relative w-full h-[240px] rounded-lg overflow-hidden border border-outline-variant bg-surface-container-low group">

<div class="absolute inset-0 flex items-center justify-center pointer-events-none">

<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-1 bg-black/20 rounded-full blur-[2px]"></div>

</div>
