<body class="min-h-screen flex flex-col justify-center items-center p-page-margin-mobile md:p-page-margin-desktop font-body-md">
<!-- Top App Bar (Modified for transactional screen - minimal) -->
<header class="fixed top-0 left-0 w-full flex justify-between items-center px-4 h-16 bg-[#f7f6f2] border-none z-50">
<button aria-label="Go Back" class="text-[#01696f] hover:opacity-80 transition-opacity flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-base text-[#01696f] tracking-tight">Fresh As Ever</h1>
<button aria-label="Skip Login" class="font-['Plus_Jakarta_Sans'] font-semibold text-base text-[#01696f] hover:opacity-80 transition-opacity">
            Skip
        </button>
</header>
<main class="w-full max-w-md mt-16 pb-16">
<div class="text-center mb-xl">
<h2 class="font-display text-display text-text mb-sm">Welcome Back</h2>
<p class="font-body-md text-body-md text-text-muted">Sign in to rescue delicious food.</p>
</div>
<!-- Card Container -->
<div class="bg-surface rounded-xl p-md md:p-xl ambient-shadow">
<!-- Tabs (Visual only for layout demonstration) -->
<div class="flex border-b border-divider mb-lg">
<button class="flex-1 pb-sm font-label text-label text-primary border-b-2 border-primary">Customer</button>
<button class="flex-1 pb-sm font-label text-label text-text-faint hover:text-text-muted transition-colors">Merchant</button>
</div>
<!-- Customer Login Form (Active) -->
<form class="space-y-lg" id="customer-login">
<div class="space-y-xs">
<label class="block font-label text-label text-on-surface-variant" for="phone">Phone Number</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-text-muted">
<span class="material-symbols-outlined text-[20px]" data-icon="call">call</span>
</span>
<input class="block w-full pl-[40px] pr-md py-sm rounded-lg border border-outline-variant bg-surface text-text font-body-md focus:border-primary-container focus:ring-2 focus:ring-primary-highlight focus:outline-none transition-shadow" id="phone" name="phone" placeholder="+94 77 123 4567" required="" type="tel"/>
</div>
</div>
<button class="w-full h-[48px] bg-primary-container text-on-primary rounded-lg font-label text-label flex items-center justify-center btn-scale" type="submit">
                    Send OTP
                </button>
<div class="text-center mt-lg">
<p class="font-body-sm text-body-sm text-text-muted">
                        Don't have an account? <a class="text-primary-container font-medium hover:underline" href="#">Sign up</a>
</p>
</div>
</form>
<!-- Divider -->
<div class="relative flex py-lg items-center hidden">
<div class="flex-grow border-t border-divider"></div>
<span class="flex-shrink-0 mx-4 text-text-faint font-label text-label">or</span>
<div class="flex-grow border-t border-divider"></div>
</div>
<!-- Merchant Login Form (Hidden by default in this view, included for structure) -->
<form class="space-y-lg hidden" id="merchant-login">
<div class="space-y-xs">
<label class="block font-label text-label text-on-surface-variant" for="email">Email Address</label>
<input class="block w-full px-md py-sm rounded-lg border border-outline-variant bg-surface text-text font-body-md focus:border-primary-container focus:ring-2 focus:ring-primary-highlight focus:outline-none transition-shadow" id="email" name="email" placeholder="merchant@cafe.com" type="email"/>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-label text-label text-on-surface-variant" for="password">Password</label>
<a class="font-label text-label text-primary-container hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="block w-full px-md py-sm rounded-lg border border-outline-variant bg-surface text-text font-body-md focus:border-primary-container focus:ring-2 focus:ring-primary-highlight focus:outline-none transition-shadow" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-text-muted hover:text-text focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full h-[48px] bg-primary-container text-on-primary rounded-lg font-label text-label flex items-center justify-center btn-scale" type="submit">
                    Sign In as Merchant
                </button>
</form>
</div>
<!-- Decorative subtle element -->
<div class="mt-xl flex justify-center opacity-30">
<img alt="Subtle background texture of coffee beans" class="h-24 w-24 object-cover rounded-full blur-sm" data-alt="close up macro shot of roasted coffee beans warm lighting abstract texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5oNgFP9CfJ50EXSoGTFvhNZKkBo9ZQ5ep7CSohjV6LMLYyQvajB8uomefU6koZCSGD_CSrolUqjsdGqeG5H7O7ayc_fS0r4ehxui6lsnjtJiwzQCFHh3rRb2W6cTZpRIK4rFkyr3eBHDRZMD4BI1UEZrzuwbrdum8NNF7d14_QHD_scEqsaCqZQtWYxzqbjNDmcNf_bIJy44YeF3YJFxytaYnfu3F8LJKR0658GvIUv6HEAv4zjltpgR3x3p29Gh1UfrXHO1Z1GY"/>
